<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>crumbs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Toolbar ─────────────────────────────────────────────────────── -->
  <header id="toolbar">
    <!-- Row 1: app identity + action buttons -->
    <div class="toolbar-row toolbar-row-1">
      <div class="toolbar-left">
        <span class="app-name">crumbs</span>
        <span class="store-path" id="store-path"></span>
      </div>
      <div class="toolbar-actions">
        <button type="button" id="sidebar-toggle-btn" class="btn btn-secondary btn-small" title="Toggle store sidebar">&#9776;</button>
        <div class="toolbar-sep"></div>
        <button type="button" id="open-dir-btn" class="btn btn-secondary btn-small" title="Open a directory as a crumbs store">Open Dir</button>
        <button type="button" id="new-btn" class="btn btn-action btn-small" title="Create a new item">+ New</button>
        <div class="toolbar-sep"></div>
        <button type="button" id="start-btn"  class="btn btn-action btn-small"    disabled title="Mark selected item as In Progress">Start</button>
        <button type="button" id="block-btn"  class="btn btn-warn btn-small"      disabled title="Mark selected item as Blocked">Block</button>
        <button type="button" id="defer-btn"  class="btn btn-secondary btn-small" disabled title="Mark selected item as Deferred">Defer</button>
        <button type="button" id="close-item-btn" class="btn btn-danger btn-small" disabled title="Close selected item">Close</button>
        <button type="button" id="delete-btn" class="btn btn-danger-solid btn-small" disabled title="Delete selected item permanently">Delete</button>
        <div class="toolbar-sep"></div>
        <button type="button" id="clean-btn"  class="btn btn-secondary btn-small" title="Delete all closed items">Clean closed</button>
      </div>
    </div>
    <!-- Row 2: filters + toggles -->
    <div class="toolbar-row toolbar-row-2">
      <div class="toolbar-filters">
        <button type="button" class="filter-btn active" data-status="all">All</button>
        <button type="button" class="filter-btn" data-status="open">Open</button>
        <button type="button" class="filter-btn" data-status="in_progress">In Progress</button>
        <button type="button" class="filter-btn" data-status="blocked">Blocked</button>
        <button type="button" class="filter-btn" data-status="deferred">Deferred</button>
        <button type="button" class="filter-btn" data-status="closed">Closed</button>
      </div>
      <div class="toolbar-filter-extras">
        <select id="filter-priority" class="filter-select" title="Filter by priority">
          <option value="any">Any priority</option>
          <option value="0">P0 — Critical</option>
          <option value="1">P1 — High</option>
          <option value="2">P2 — Normal</option>
          <option value="3">P3 — Low</option>
          <option value="4">P4 — Backlog</option>
        </select>
        <select id="filter-type" class="filter-select" title="Filter by type">
          <option value="any">Any type</option>
          <option value="task">Task</option>
          <option value="bug">Bug</option>
          <option value="feature">Feature</option>
          <option value="epic">Epic</option>
          <option value="idea">Idea</option>
        </select>
        <input id="filter-tag" type="text" class="filter-tag-input" placeholder="Tag…" title="Filter by tag (substring match)" autocomplete="off">
      </div>
      <div class="toolbar-right-controls">
        <label class="toggle-label">
          <input type="checkbox" id="show-closed"> Closed
        </label>
        <button type="button" id="col-picker-btn" class="btn btn-secondary btn-small" title="Show/hide columns">Columns &#9660;</button>
        <div id="col-picker-menu" class="col-picker-menu hidden"></div>
        <button type="button" id="theme-btn" class="btn btn-secondary btn-small" title="Toggle light/dark theme">&#9788;</button>
        <button type="button" id="refresh-btn" class="btn btn-secondary btn-small" title="Reload items from disk">Refresh</button>
      </div>
    </div>
  </header>

  <!-- ── Main layout ─────────────────────────────────────────────────── -->
  <div id="layout">

    <!-- Left sidebar: recent stores -->
    <div id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Stores</span>
        <div class="sidebar-header-actions">
          <button type="button" id="sidebar-add-btn" class="btn btn-secondary btn-small sidebar-btn" title="Open a directory and add to stores">+</button>
          <button type="button" id="sidebar-remove-btn" class="btn btn-secondary btn-small sidebar-btn" title="Remove selected store from list">−</button>
        </div>
      </div>
      <div id="store-list"></div>
    </div>
    <div id="sidebar-resizer"></div>

    <!-- Right content -->
    <div id="content">

      <!-- Item list (top) -->
      <section id="list-pane">
        <div id="error-banner" class="error-banner hidden"></div>
        <div id="empty-state" class="empty-state hidden">No items.</div>
        <table id="items-table" class="hidden">
          <colgroup id="items-colgroup"></colgroup>
          <thead><tr id="items-thead-row"></tr></thead>
          <tbody id="items-body"></tbody>
        </table>
      </section>

      <!-- Resize handle -->
      <div id="resize-handle"></div>

      <!-- Detail pane (bottom) — shown when an item is selected -->
      <section id="detail-pane" class="hidden">
        <div id="detail-left">
          <div class="panel-title">Properties</div>
          <div class="prop-grid" id="prop-grid"></div>
          <div class="detail-actions" id="detail-actions"></div>
        </div>
        <div id="detail-right">
          <div class="panel-title">
            <span id="detail-title-label"></span>
            <button type="button" id="preview-btn" class="btn btn-secondary btn-small" title="Toggle markdown preview">Preview</button>
          </div>
          <textarea id="detail-text" placeholder="No body text."></textarea>
          <div id="detail-preview" class="hidden markdown-body"></div>
        </div>
      </section>

    </div>
  </div>

  <!-- Close modal -->
  <div id="close-modal" class="modal hidden">
    <div class="modal-box">
      <h2>Close item</h2>
      <input id="close-reason" type="text" placeholder="Reason (optional)" autocomplete="off">
      <div class="modal-actions">
        <button type="button" id="close-cancel-btn" class="btn btn-secondary">Cancel</button>
        <button type="button" id="close-confirm-btn" class="btn btn-danger">Close item</button>
      </div>
    </div>
  </div>

  <!-- New item modal -->
  <div id="new-modal" class="modal hidden">
    <div class="modal-box">
      <h2>New item</h2>
      <input id="new-title" type="text" placeholder="Title" autocomplete="off">
      <div class="modal-actions">
        <button type="button" id="new-cancel-btn" class="btn btn-secondary">Cancel</button>
        <button type="button" id="new-confirm-btn" class="btn btn-action">Create</button>
      </div>
    </div>
  </div>

  <!-- Open Dir modal (path + optional init prompt) -->
  <div id="open-dir-modal" class="modal hidden">
    <div class="modal-box" style="width:420px">
      <h2>Open directory</h2>
      <div class="open-dir-row">
        <input id="dir-path-input" type="text" placeholder="Paste a path, or pick below" autocomplete="off">
        <button type="button" id="dir-pick-btn" class="btn btn-secondary btn-small">Browse…</button>
      </div>
      <div id="init-prompt" class="hidden">
        <p class="init-msg">No crumbs store found here. Initialize one?</p>
        <div class="modal-actions">
          <button type="button" id="init-no-btn"  class="btn btn-secondary">No</button>
          <button type="button" id="init-yes-btn" class="btn btn-action">Yes, initialize</button>
        </div>
      </div>
      <div class="modal-actions" id="open-dir-actions">
        <button type="button" id="open-dir-cancel-btn" class="btn btn-secondary">Cancel</button>
        <button type="button" id="open-dir-ok-btn" class="btn btn-action">Open</button>
      </div>
    </div>
  </div>

  <!-- Sidebar context menu -->
  <div id="store-context-menu" class="context-menu hidden">
    <button type="button" id="ctx-rename-btn">Rename</button>
  </div>

  <script src="marked.min.js"></script>
  <script src="main.js" type="module"></script>
</body>
</html>
