name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  # ── CLI binaries ─────────────────────────────────────────────────────────
  cli:
    name: CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: crumbs
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: crumbs
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: crumbs
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: crumbs.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build CLI
        run: cargo build --release -p crumbs --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          TARGET_DIR="target/${{ matrix.target }}/release"
          BIN="${{ matrix.artifact }}"
          STEM="${BIN%.*}"
          EXT="${BIN##*.}"
          if [ "$EXT" = "$STEM" ]; then EXT=""; else EXT=".$EXT"; fi
          mv "$TARGET_DIR/$BIN" "$TARGET_DIR/${STEM}-${{ matrix.target }}${EXT}"
          echo "ASSET=$TARGET_DIR/${STEM}-${{ matrix.target }}${EXT}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── GUI installers (Tauri) ────────────────────────────────────────────────
  gui:
    name: GUI ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-aarch64
            args: --target aarch64-apple-darwin
          - os: macos-latest
            platform: macos-x86_64
            args: --target x86_64-apple-darwin
          - os: ubuntu-latest
            platform: linux-x86_64
            args: ""
          - os: windows-latest
            platform: windows-x86_64
            args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install cargo-tauri
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build and package GUI
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crumbs-gui
          tauriScript: cargo tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ""
          releaseDraft: false
          prerelease: false

  # ── Collect CLI artifacts and skill into the release ─────────────────────
  release:
    name: Publish release
    needs: [cli, gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: artifacts
          merge-multiple: true

      - name: Copy skill file into artifacts
        run: cp skills/crumbs.skill artifacts/crumbs.skill

      - name: Upload CLI binaries and skill to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
